name: Compile debug installer
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile Code DEBUG
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Read version from metadata
        id: metadata
        shell: bash
        run: |
          version=$(python -c "import json; print(json.load(open('data/metadata.json', encoding='utf-8'))['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: python -m pip install --prefer-binary -r requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: python build_installer.py --debug

      - name: Move Files
        run: |
          $env:RELEASE_NAME="${{ steps.metadata.outputs.version }}"
          $env:NEW_FILE_NAME="RenewedTroveTools-${{ steps.metadata.outputs.version }}-win64-debug-setup.exe"
          ls
          ls dist
          Move-Item "dist/RenewedTroveTools-${{ steps.metadata.outputs.version }}-win64-debug-setup.exe" ".\RenewedTroveTools-${{ steps.metadata.outputs.version }}-win64-debug-setup.exe"
          ls
          ls dist

      - name: Upload file to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.metadata.outputs.version }}" \
            "RenewedTroveTools-${{ steps.metadata.outputs.version }}-win64-debug-setup.exe" \
            --clobber
